<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Фонотека • Онлайн</title>
<style>
  :root{
    --bg:#0A0810; --surface:#15101F; --surface-2:#1D1630; --surface-3:#271D3D;
    --line:#2C2440; --line-2:#3A3055; --text:#F4EFFA; --muted:#9D92B4; --muted-2:#6E6488;
    --amber:#F7B940; --amber-2:#FFD37A; --pink:#FF6FA5; --violet:#B98CFF;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(130% 80% at 50% -10%, #1D1630 0%, var(--bg) 55%);
    color:var(--text); min-height:100vh; line-height:1.4;
    padding:16px 14px calc(150px + env(safe-area-inset-bottom));
  }
  .head{display:flex; align-items:center; gap:10px; margin:4px 2px 16px}
  .logo{
    width:40px; height:40px; border-radius:12px;
    background:linear-gradient(145deg,var(--amber-2),var(--pink));
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .head h1{font-size:20px; letter-spacing:.3px}
  .head span{display:block; font-size:12px; color:var(--muted-2); font-weight:400}
  .searchbar{display:flex; gap:8px; position:sticky; top:6px; z-index:20}
  #q{
    flex:1; min-width:0; padding:14px 16px; border-radius:14px;
    background:var(--surface-2); border:1px solid var(--line-2);
    color:var(--text); font-size:16px; outline:none;
  }
  #q::placeholder{color:var(--muted-2)}
  #q:focus{border-color:var(--violet)}
  #go{
    padding:0 18px; border:none; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,var(--amber),var(--amber-2));
    color:#0E0B14; font-size:18px; font-weight:700;
  }
  .hint{color:var(--muted-2); font-size:13px; margin:14px 4px; text-align:center}
  .msg{
    margin:18px 6px; padding:16px; border-radius:14px; font-size:14px;
    background:var(--surface); border:1px solid var(--line); color:var(--muted);
  }
  .msg b{color:var(--text)}
  #list{margin-top:14px; display:flex; flex-direction:column; gap:8px}
  .row{
    display:flex; gap:12px; align-items:center; padding:8px;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    cursor:pointer; transition:background .12s;
  }
  .row:active{background:var(--surface-3)}
  .row.playing{border-color:var(--amber); background:var(--surface-2)}
  .thumb{width:72px; height:54px; border-radius:9px; object-fit:cover; flex-shrink:0; background:var(--surface-3)}
  .info{min-width:0; flex:1}
  .title{font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .chan{font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px}
  .play-ic{color:var(--amber); font-size:20px; padding:0 6px; flex-shrink:0}

  /* нижний проигрыватель */
  #bar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:linear-gradient(180deg,rgba(21,16,31,.96),rgba(10,8,16,.99));
    border-top:1px solid var(--line-2);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    transform:translateY(120%); transition:transform .25s ease;
  }
  #bar.up{transform:translateY(0)}
  .np{display:flex; align-items:center; gap:10px}
  #ytwrap{width:96px; height:64px; border-radius:10px; overflow:hidden; flex-shrink:0; background:#000}
  #ytwrap iframe{width:100%; height:100%; border:0}
  .np-info{min-width:0; flex:1}
  #npTitle{font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  #npChan{font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px}
  .np-note{font-size:11px; color:var(--muted-2); margin-top:3px}
  .spin{display:inline-block; width:18px; height:18px; border:2px solid var(--line-2); border-top-color:var(--amber); border-radius:50%; animation:sp .8s linear infinite; vertical-align:-4px; margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .setup a{color:var(--amber-2)}
  code{background:var(--surface-3); padding:2px 6px; border-radius:6px; font-size:13px}
</style>
</head>
<body>
  <div class="head">
    <div class="logo">🎵</div>
    <div><h1>Фонотека <span>слушай онлайн · с телефона</span></h1></div>
  </div>

  <div class="searchbar">
    <input id="q" type="search" enterkeyhint="search" placeholder="Название песни или артист…" autocomplete="off">
    <button id="go">🔍</button>
  </div>

  <div id="status"></div>
  <div id="list"></div>

  <!-- нижний плеер -->
  <div id="bar">
    <div class="np">
      <div id="ytwrap"><div id="player"></div></div>
      <div class="np-info">
        <div id="npTitle">—</div>
        <div id="npChan"></div>
        <div class="np-note">играет через YouTube · звук в фоне идёт</div>
      </div>
    </div>
  </div>

<script>
  // ================== НАСТРОЙКА ==================
  // Сюда вставляется бесплатный ключ YouTube (Claude добавит после того, как ты его получишь)
  const YT_API_KEY = "ВСТАВЬ_КЛЮЧ_СЮДА";
  // ==============================================

  const $ = s => document.querySelector(s);
  const list = $('#list'), status = $('#status'), bar = $('#bar');
  let player, ytReady = false, curRow = null;

  // грузим YouTube IFrame API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('player', {
      height:'64', width:'96',
      playerVars:{playsinline:1, rel:0},
      events:{ 'onReady': ()=>{ ytReady = true; } }
    });
  };

  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function showSetup(){
    status.innerHTML = `<div class="msg setup">
      <b>Плеер почти готов 🙌</b><br>
      Осталось вставить бесплатный ключ YouTube (одноразовая настройка владельцем).
      Пока его нет — поиск не работает. Хозяин Фонотеки, вставь ключ в файл
      <code>player.html</code> в строку <code>YT_API_KEY</code>.
    </div>`;
  }

  async function search(){
    const q = $('#q').value.trim();
    if(!q) return;
    if(!YT_API_KEY || YT_API_KEY.indexOf('ВСТАВЬ') === 0){ showSetup(); return; }
    list.innerHTML = '';
    status.innerHTML = '<div class="hint"><span class="spin"></span>Ищу…</div>';
    try{
      const url = 'https://www.googleapis.com/youtube/v3/search'
        + '?part=snippet&type=video&videoCategoryId=10&maxResults=20'
        + '&q=' + encodeURIComponent(q) + '&key=' + YT_API_KEY;
      const r = await fetch(url);
      const data = await r.json();
      if(data.error){
        status.innerHTML = '<div class="msg">Поиск временно недоступен (лимит ключа на сегодня исчерпан или ключ неверный). Попробуй позже.</div>';
        return;
      }
      if(!data.items || !data.items.length){
        status.innerHTML = '<div class="hint">Ничего не нашлось 🤷</div>';
        return;
      }
      status.innerHTML = '';
      data.items.forEach(it => {
        const id = it.id.videoId; if(!id) return;
        const sn = it.snippet;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML =
          `<img class="thumb" loading="lazy" src="${sn.thumbnails.medium.url}">
           <div class="info">
             <div class="title">${esc(sn.title)}</div>
             <div class="chan">${esc(sn.channelTitle)}</div>
           </div>
           <div class="play-ic">▶</div>`;
        row.onclick = () => play(id, sn.title, sn.channelTitle, row);
        list.appendChild(row);
      });
    }catch(e){
      status.innerHTML = '<div class="msg">Нет связи с поиском. Проверь интернет и попробуй ещё раз.</div>';
    }
  }

  function play(id, title, chan, row){
    if(!ytReady){ setTimeout(()=>play(id,title,chan,row), 400); return; }
    if(curRow) curRow.classList.remove('playing');
    curRow = row; row.classList.add('playing');
    $('#npTitle').textContent = title;
    $('#npChan').textContent = chan;
    bar.classList.add('up');
    player.loadVideoById(id);
    player.playVideo();
  }

  $('#go').onclick = search;
  $('#q').addEventListener('keydown', e => { if(e.key === 'Enter') search(); });

  // приветствие
  status.innerHTML = '<div class="hint">Введи название песни и жми 🔍<br>Играет прямо здесь, скачивать ничего не надо.</div>';
</script>
</body>
</html>
